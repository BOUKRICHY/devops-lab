version: "3.9"

services:

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: devopsdb
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: Shazam2003
    volumes:
      - db_data:/var/lib/postgresql/data

  web:
    build: ./app
    container_name: flask_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      POSTGRES_DB: devopsdb
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: Shazam2003
    depends_on:
      - db

volumes:
  db_data:
